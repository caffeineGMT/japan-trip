<!DOCTYPE html>

<head>

  <meta name="description" content="Your complete Japan cherry blossom trip companion - Tokyo, Kyoto, Osaka, Nara">
  <title>Japan Trip - April 2026</title>

  <!-- PWA Manifest -->

  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/dayjs.min.js"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="components/affiliate-widget.css">
</head>
<body>
  <!-- Top nav -->
  <header id="top-header">
    <button id="sidebar-toggle" class="hamburger" aria-label="Toggle sidebar">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="header-left">
      <h1>Japan 2026</h1>
      <span class="header-dates">Mar 30 &ndash; Apr 13</span>
    </div>
    <nav class="top-nav">
      <a href="/" class="active">Map</a>
      <a href="/reservations.html">Reservations</a>
      <a href="/checklist.html">Packing</a>
      <a href="/saved-places.html">Saved Places</a>
    </nav>
    <div id="sakura-widget" class="sakura-widget"></div>
    <button id="whatsNextToggle" class="btn-toggle">What's Next</button>
    <nav class="day-tabs" id="day-tabs"></nav>
    <button id="phrases-btn" class="icon-btn" title="Japanese Phrases">🗣️</button>
    <div class="lang-switcher">
      <button data-lang="en" class="active">EN</button>
      <button data-lang="zh">中文</button>
      <button data-lang="ja">日本語</button>
    </div>
  </header>

  <div class="app-layout">
    <!-- Sidebar: itinerary -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header" id="sidebar-header"></div>
      <div class="sidebar-content" id="sidebar-content"></div>
    </aside>

    <!-- Map -->
    <div class="map-container">
      <div id="map"></div>
    </div>
  </div>

  <script src="i18n.js"></script>
  <!-- data.js now loaded dynamically via template loader -->
  <script src="config.js"></script>
  <script src="weather.js"></script>
  <script src="routes.js"></script>
  <script src="sakura-widget.js"></script>
  <!-- Affiliate Monetization -->
  <script src="lib/affiliate-tracker.js"></script>
  <script src="widgets/hotels.js"></script>
  <script src="widgets/activities.js"></script>
  <script src="widgets/transport.js"></script>
  <!-- Main App (ES6 Module with dynamic template loading) -->
  <script type="module" src="script.js"></script>
  <script src="whats-next.js"></script>

  <!-- AI Assistant -->
  <script src="components/ai-assistant.js"></script>

  <!-- Phrases Modal -->
  <div id="phrases-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Japanese Travel Phrases</h3>
        <button class="close-modal" aria-label="Close">&times;</button>
      </div>
      <div id="phrases-list" class="phrases-list"></div>
    </div>
  </div>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(registration => {
            console.log('✓ Service Worker registered:', registration.scope);

            // Check for updates periodically
            setInterval(() => {
              registration.update();
            }, 60 * 60 * 1000); // Check every hour

            // Listen for updates
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // New version available
                  if (confirm('A new version is available! Reload to update?')) {
                    newWorker.postMessage({ type: 'SKIP_WAITING' });
                    window.location.reload();
                  }
                }
              });
            });
          })
          .catch(error => {
            console.error('✗ Service Worker registration failed:', error);
          });

        // Reload page when new service worker takes control
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) {
            refreshing = true;
            window.location.reload();
          }
        });
      });
    }
  </script>
</body>
</html>
