<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partner Dashboard - TripCompanion</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f5f7fa;
      color: #1a1a1a;
    }

    .header {
      background: linear-gradient(135deg, #FF6B9D 0%, #C06C84 100%);
      color: white;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logout-btn {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .logout-btn:hover {
      background: rgba(255,255,255,0.3);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .login-screen {
      max-width: 400px;
      margin: 100px auto;
      padding: 32px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .login-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      text-align: center;
    }

    .login-subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 14px;
    }

    .form-input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }

    .form-input:focus {
      outline: none;
      border-color: #FF6B9D;
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #FF6B9D 0%, #C06C84 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-message {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .dashboard {
      display: none;
    }

    .dashboard.active {
      display: block;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .stat-label {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: #1a1a1a;
    }

    .stat-change {
      font-size: 13px;
      margin-top: 8px;
      color: #22c55e;
    }

    .section {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .select-trip {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .code-block {
      background: #f5f5f5;
      padding: 16px;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      white-space: pre-wrap;
      word-wrap: break-word;
      border: 1px solid #e0e0e0;
      position: relative;
    }

    .copy-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #FF6B9D;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }

    .chart-container {
      position: relative;
      height: 300px;
      margin-top: 20px;
    }

    .affiliate-code {
      display: inline-block;
      background: #f0f0f0;
      padding: 8px 16px;
      border-radius: 6px;
      font-family: monospace;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <h1 class="login-title">Partner Dashboard</h1>
    <p class="login-subtitle">Sign in to access your affiliate stats</p>
    <div id="errorMessage" class="error-message" style="display: none;"></div>
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="emailInput" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="passwordInput" required>
      </div>
      <button type="submit" class="btn-primary" id="loginBtn">Sign In</button>
    </form>
  </div>

  <div id="dashboardScreen" style="display:none;">
    <div class="header">
      <div class="header-content">
        <div class="logo">🌸 TripCompanion Partners</div>
        <div class="user-info">
          <span id="userEmail"></span>
          <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
      </div>
    </div>
    <div class="container">
      <div id="dashboardContent" class="dashboard">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">💰 Total Earnings</div>
            <div class="stat-value" id="totalEarnings">$0.00</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">👁️ Impressions</div>
            <div class="stat-value" id="impressions">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">🖱️ Clicks</div>
            <div class="stat-value" id="clicks">0</div>
            <div class="stat-change" id="ctr">0% CTR</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">✅ Signups</div>
            <div class="stat-value" id="signups">0</div>
          </div>
        </div>
        <div class="section">
          <h2 class="section-title">Earnings Overview</h2>
          <div class="chart-container">
            <canvas id="earningsChart"></canvas>
          </div>
        </div>
        <div class="section">
          <h2 class="section-title">Your Affiliate Details</h2>
          <p>Code: <span class="affiliate-code" id="affiliateCode">LOADING</span></p>
          <p style="margin-top:12px;">Commission: <strong id="commissionRate">25%</strong></p>
          <p style="margin-top:8px;">Pending: <strong id="pendingPayout">$0.00</strong></p>
        </div>
        <div class="section">
          <h2 class="section-title">Widget Generator</h2>
          <select class="select-trip" id="tripSelect">
            <option value="japan-cherry-blossom">Japan Cherry Blossom</option>
          </select>
          <div class="code-block" id="embedCode">Loading...</div>
          <button class="copy-btn" onclick="copyCode()">Copy</button>
        </div>
      </div>
    </div>
  </div>
  <script>
    const supabase = window.supabase.createClient(
      process.env.SUPABASE_URL || 'https://placeholder.supabase.co',
      process.env.SUPABASE_ANON_KEY || 'placeholder-key'
    );
    let currentUser = null;
    
    async function checkAuth() {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        currentUser = session.user;
        await loadDashboard();
      }
    }
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('emailInput').value;
      const password = document.getElementById('passwordInput').value;
      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        currentUser = data.user;
        await loadDashboard();
      } catch (error) {
        document.getElementById('errorMessage').textContent = error.message;
        document.getElementById('errorMessage').style.display = 'block';
      }
    });
    
    async function logout() {
      await supabase.auth.signOut();
      location.reload();
    }
    
    async function loadDashboard() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboardScreen').style.display = 'block';
      document.getElementById('userEmail').textContent = currentUser.email;
      
      const res = await fetch('/api/affiliate/stats?userId=' + currentUser.id);
      const stats = await res.json();
      
      document.getElementById('totalEarnings').textContent = '$' + (stats.revenue || 0).toFixed(2);
      document.getElementById('impressions').textContent = stats.impressions || 0;
      document.getElementById('clicks').textContent = stats.clicks || 0;
      document.getElementById('signups').textContent = stats.signups || 0;
      document.getElementById('affiliateCode').textContent = stats.affiliateCode || 'N/A';
      document.getElementById('pendingPayout').textContent = '$' + (stats.pendingPayout || 0).toFixed(2);
      
      const ctr = stats.impressions > 0 ? ((stats.clicks / stats.impressions) * 100).toFixed(1) : 0;
      document.getElementById('ctr').textContent = ctr + '% CTR';
      
      updateEmbedCode(stats.affiliateCode);
      document.getElementById('dashboardContent').classList.add('active');
      
      const ctx = document.getElementById('earningsChart').getContext('2d');
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
          datasets: [{
            label: 'Earnings',
            data: [0, 50, 120, 200, 350, 500],
            borderColor: '#FF6B9D',
            tension: 0.4
          }]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });
    }
    
    function updateEmbedCode(code) {
      const tripId = document.getElementById('tripSelect').value;
      document.getElementById('embedCode').textContent = 
        `<script src="https://tripcompanion.app/embed.js" data-trip="${tripId}" data-affiliate="${code}"><\/script>`;
    }
    
    function copyCode() {
      navigator.clipboard.writeText(document.getElementById('embedCode').textContent);
      event.target.textContent = 'Copied!';
      setTimeout(() => event.target.textContent = 'Copy', 2000);
    }
    
    document.getElementById('tripSelect').addEventListener('change', () => updateEmbedCode(affiliateCode));
    checkAuth();
  </script>
</body>
</html>
