<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trip Preview</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      padding: 20px;
      background: #ffffff;
    }

    body.dark {
      background: #1a1a1a;
      color: #ffffff;
    }

    .widget-container {
      max-width: 600px;
      margin: 0 auto;
    }

    .trip-header {
      margin-bottom: 20px;
    }

    .trip-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1a1a1a;
    }

    body.dark .trip-title {
      color: #ffffff;
    }

    .trip-meta {
      font-size: 14px;
      color: #666;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    body.dark .trip-meta {
      color: #999;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    #map {
      width: 100%;
      height: 200px;
      border-radius: 8px;
      margin-bottom: 20px;
      border: 1px solid #e0e0e0;
    }

    body.dark #map {
      border-color: #333;
    }

    .highlights {
      margin-bottom: 20px;
    }

    .highlights-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #1a1a1a;
    }

    body.dark .highlights-title {
      color: #ffffff;
    }

    .highlight-item {
      padding: 12px;
      margin-bottom: 8px;
      background: #f5f5f5;
      border-radius: 8px;
      border-left: 3px solid #FF6B9D;
    }

    body.dark .highlight-item {
      background: #2a2a2a;
    }

    .highlight-name {
      font-weight: 600;
      margin-bottom: 4px;
      color: #1a1a1a;
    }

    body.dark .highlight-name {
      color: #ffffff;
    }

    .highlight-desc {
      font-size: 13px;
      color: #666;
    }

    body.dark .highlight-desc {
      color: #999;
    }

    .cta-button {
      display: block;
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(135deg, #FF6B9D 0%, #C06C84 100%);
      color: white;
      text-align: center;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
      border: none;
      cursor: pointer;
    }

    .cta-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 107, 157, 0.3);
    }

    .powered-by {
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: #999;
    }

    body.dark .powered-by {
      color: #666;
    }

    .powered-by a {
      color: #FF6B9D;
      text-decoration: none;
    }

    @media (max-width: 480px) {
      body {
        padding: 12px;
      }

      .trip-title {
        font-size: 20px;
      }

      #map {
        height: 180px;
      }
    }
  </style>
</head>
<body>
  <div class="widget-container">
    <div class="trip-header">
      <h1 class="trip-title" id="tripTitle">Loading...</h1>
      <div class="trip-meta">
        <span class="meta-item">
          <span>📅</span>
          <span id="tripDays">14 days</span>
        </span>
        <span class="meta-item">
          <span>📍</span>
          <span id="tripDestinations">4 cities</span>
        </span>
        <span class="meta-item">
          <span>🌸</span>
          <span>Cherry Blossom Season</span>
        </span>
      </div>
    </div>

    <div id="map"></div>

    <div class="highlights">
      <h2 class="highlights-title">Trip Highlights</h2>
      <div id="highlightsList"></div>
    </div>

    <button class="cta-button" id="ctaButton">
      View Full Trip & Book Activities →
    </button>

    <div class="powered-by">
      Powered by <a href="https://tripcompanion.app" target="_blank">TripCompanion</a>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    (function() {
      // Parse URL parameters
      const params = new URLSearchParams(window.location.search);
      const tripId = window.location.pathname.split('/').pop() || 'japan-cherry-blossom';
      const affiliateId = params.get('aff') || '';
      const theme = params.get('theme') || 'light';

      // Apply theme
      if (theme === 'dark') {
        document.body.classList.add('dark');
      }

      // Trip data (in production, this would be loaded from API)
      const tripData = {
        'japan-cherry-blossom': {
          title: '🌸 Japan Cherry Blossom Adventure',
          days: 14,
          destinations: ['Tokyo', 'Kyoto', 'Osaka', 'Nara'],
          highlights: [
            {
              name: 'Senso-ji Temple',
              desc: 'Tokyo\'s oldest and most iconic Buddhist temple in Asakusa'
            },
            {
              name: 'Fushimi Inari Shrine',
              desc: 'Famous for thousands of vermilion torii gates in Kyoto'
            },
            {
              name: 'Osaka Castle',
              desc: 'Historic landmark surrounded by cherry blossoms in spring'
            },
            {
              name: 'Nara Park',
              desc: 'Meet friendly deer under blooming sakura trees'
            }
          ],
          center: [35.6762, 139.6503],
          markers: [
            { lat: 35.6762, lng: 139.6503, name: 'Tokyo' },
            { lat: 35.0116, lng: 135.7681, name: 'Kyoto' },
            { lat: 34.6937, lng: 135.5023, name: 'Osaka' },
            { lat: 34.6851, lng: 135.8048, name: 'Nara' }
          ]
        },
        'kyoto-food-tour': {
          title: '🍜 Ultimate Kyoto Food Tour',
          days: 5,
          destinations: ['Kyoto'],
          highlights: [
            {
              name: 'Nishiki Market',
              desc: 'Kyoto\'s kitchen - 400-year-old food market'
            },
            {
              name: 'Kaiseki Experience',
              desc: 'Traditional multi-course Japanese dinner'
            },
            {
              name: 'Tea Ceremony',
              desc: 'Authentic matcha ceremony in historic tea house'
            }
          ],
          center: [35.0116, 135.7681],
          markers: [
            { lat: 35.0116, lng: 135.7681, name: 'Kyoto' }
          ]
        }
      };

      const trip = tripData[tripId] || tripData['japan-cherry-blossom'];

      // Populate trip info
      document.getElementById('tripTitle').textContent = trip.title;
      document.getElementById('tripDays').textContent = trip.days + ' days';
      document.getElementById('tripDestinations').textContent = trip.destinations.length + ' ' + (trip.destinations.length === 1 ? 'city' : 'cities');

      // Populate highlights
      const highlightsList = document.getElementById('highlightsList');
      trip.highlights.forEach(highlight => {
        const item = document.createElement('div');
        item.className = 'highlight-item';
        item.innerHTML = `
          <div class="highlight-name">${highlight.name}</div>
          <div class="highlight-desc">${highlight.desc}</div>
        `;
        highlightsList.appendChild(item);
      });

      // Initialize map
      const map = L.map('map', {
        scrollWheelZoom: false,
        dragging: !L.Browser.mobile,
        tap: false
      }).setView(trip.center, 6);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors',
        maxZoom: 18
      }).addTo(map);

      // Add markers
      trip.markers.forEach(marker => {
        L.marker([marker.lat, marker.lng])
          .addTo(map)
          .bindPopup(marker.name);
      });

      // Fit bounds to show all markers
      if (trip.markers.length > 1) {
        const bounds = L.latLngBounds(trip.markers.map(m => [m.lat, m.lng]));
        map.fitBounds(bounds, { padding: [20, 20] });
      }

      // CTA button click handler
      document.getElementById('ctaButton').addEventListener('click', function() {
        // Notify parent window about click
        if (window.parent !== window) {
          window.parent.postMessage({
            type: 'tripcompanion-click',
            trip: tripId,
            affiliate: affiliateId
          }, '*');
        }

        // Open full trip page with affiliate tracking
        const url = `https://tripcompanion.app/trip/${tripId}?ref=${encodeURIComponent(affiliateId)}`;
        window.open(url, '_blank');
      });

      // Auto-resize iframe
      function resizeIframe() {
        const height = document.body.scrollHeight;
        if (window.parent !== window) {
          window.parent.postMessage({
            type: 'tripcompanion-resize',
            height: height
          }, '*');
        }
      }

      // Resize on load and when content changes
      window.addEventListener('load', resizeIframe);
      setTimeout(resizeIframe, 500); // Give map time to render
    })();
  </script>
</body>
</html>
