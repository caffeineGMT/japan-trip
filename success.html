<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful - Japan Trip Companion</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .success-container {
      max-width: 600px;
      margin: 80px auto;
      padding: 48px;
      text-align: center;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }

    .success-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: #4caf50;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      color: white;
    }

    .success-container h1 {
      color: #333;
      margin: 0 0 16px 0;
    }

    .success-container p {
      color: #666;
      font-size: 18px;
      margin: 0 0 32px 0;
    }

    .action-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 14px 32px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      border: none;
    }

    .btn-primary {
      background: #ff6b9d;
      color: white;
    }

    .btn-primary:hover {
      background: #e55a8a;
    }

    .btn-secondary {
      background: #f5f5f5;
      color: #333;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .loading {
      color: #666;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="success-container">
    <div class="success-icon">✓</div>
    <h1>Payment Successful!</h1>
    <p id="success-message" class="loading">Verifying your purchase...</p>

    <div id="actions" class="action-buttons" style="display: none;">
      <a href="/" class="btn btn-primary">Start Planning</a>
      <a href="/account.html" class="btn btn-secondary">View Account</a>
    </div>
  </div>

  <!-- Analytics -->
  <script src="lib/analytics.js"></script>
  <script src="lib/analytics-init.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Get session ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const sessionId = urlParams.get('session_id');

    async function verifyPayment() {
      if (!sessionId) {
        document.getElementById('success-message').textContent = 'No session found. Please check your email for confirmation.';
        document.getElementById('actions').style.display = 'flex';
        return;
      }

      try {
        // Fetch session details from Stripe
        const response = await fetch(`/api/stripe/session/${sessionId}`);
        const sessionData = await response.json();

        // Extract plan details
        const plan = sessionData.metadata?.plan || 'unknown';
        const amount = sessionData.amount_total ? sessionData.amount_total / 100 : 0;
        const billingCycle = plan === 'premium' ? 'monthly' : 'one-time';

        // Track purchase completion
        if (window.Analytics) {
          Analytics.trackPurchaseCompleted(
            plan,
            amount,
            billingCycle,
            sessionId
          );
        }

        // Update user plan in localStorage
        localStorage.setItem('user_plan', plan);
        localStorage.setItem('last_purchase_success', Date.now());
        localStorage.setItem('purchase_details', JSON.stringify({
          plan,
          amount,
          date: new Date().toISOString(),
          sessionId
        }));

        // Update message based on plan
        let message = 'Your purchase has been confirmed! ';
        if (plan === 'premium') {
          message += 'Your 7-day free trial has started. You now have unlimited access to all Premium features.';
        } else if (plan === 'lifetime') {
          message += 'You now have lifetime access to all Premium features!';
        } else {
          message += 'You now have access to your purchase.';
        }

        document.getElementById('success-message').textContent = message;
        document.getElementById('actions').style.display = 'flex';

      } catch (error) {
        console.error('Error verifying payment:', error);

        // Fallback message
        document.getElementById('success-message').textContent = 'Your purchase has been confirmed! Check your email for details.';
        document.getElementById('actions').style.display = 'flex';

        // Track with basic info
        if (window.Analytics) {
          Analytics.trackPurchaseCompleted('unknown', 0, 'unknown', sessionId);
        }
      }
    }

    // Wait a moment for webhook to process, then verify
    setTimeout(verifyPayment, 2000);
  </script>
</body>
</html>
