<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Trip Builder - Japan Trip Companion</title>
  <link rel="stylesheet" href="style.css">

  <!-- Leaflet CSS for map preview -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- SortableJS for drag and drop -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>
  <div class="builder-container">
    <!-- Left Sidebar: Trip Settings -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Trip Builder</h1>
        <p>Create your perfect itinerary</p>
      </div>

      <div class="sidebar-content">
        <div class="sidebar-section">
          <label for="trip-title">Trip Title</label>
          <input
            type="text"
            id="trip-title"
            placeholder="My Japan Adventure"
            value="My Japan Trip"
          />
        </div>

        <div class="sidebar-section">
          <label for="destination">Destination</label>
          <div style="position: relative;">
            <input
              type="search"
              id="destination"
              placeholder="Search location..."
              value="Japan"
              autocomplete="off"
            />
            <div id="destination-autocomplete" class="autocomplete-dropdown" style="display: none;"></div>
          </div>
        </div>

        <div class="sidebar-section">
          <label>Trip Dates</label>
          <div class="date-range">
            <input type="date" id="start-date" />
            <input type="date" id="end-date" />
          </div>
        </div>

        <div class="sidebar-section">
          <button id="add-day-btn" class="btn-secondary">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/>
            </svg>
            Add Day
          </button>
        </div>
      </div>

      <div class="sidebar-footer">
        <button id="import-btn" class="btn-text" style="flex: 1;">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
            <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
          </svg>
          Import
        </button>
        <button id="export-btn" class="btn-primary">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
            <path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708l3-3z"/>
          </svg>
          Export
        </button>
      </div>
    </aside>

    <!-- Center Panel: Day Editors -->
    <main class="center-panel">
      <div class="days-container" id="days-container">
        <div class="empty-state">
          <svg width="64" height="64" viewBox="0 0 16 16" fill="currentColor">
            <path d="M11 6.5a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5v-1zm-3 0a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5v-1zm-5 3a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5v-1zm3 0a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5v-1z"/>
            <path d="M3.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2h1V.5a.5.5 0 0 1 .5-.5zM1 4v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4H1z"/>
          </svg>
          <h3>Start Planning Your Trip</h3>
          <p>Click "Add Day" to create your first day</p>
        </div>
      </div>
    </main>

    <!-- Right Panel: Map Preview -->
    <aside class="preview-panel">
      <div class="preview-header">
        <h2>Live Preview</h2>
        <p>Your trip on the map</p>
      </div>
      <div id="preview-map"></div>
    </aside>
  </div>

  <!-- Hidden file input for import -->
  <input type="file" id="import-file-input" accept=".json" style="display: none;" />

  <!-- Add Stop Modal -->
  <div id="add-stop-modal" class="modal-overlay" style="display: none;">
    <div class="modal">
      <div class="modal-header">
        <h3>Add Stop</h3>
      </div>
      <div class="modal-body">
        <div style="margin-bottom: 16px;">
          <label style="display: block; margin-bottom: 6px; font-size: 13px; font-weight: 500;">
            Search for a place
          </label>
          <input
            type="search"
            id="stop-search-input"
            placeholder="e.g., Tokyo Tower, Fushimi Inari"
            style="width: 100%; padding: 8px 12px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 14px;"
          />
        </div>
        <div id="stop-search-results" class="search-results"></div>
      </div>
      <div class="modal-footer">
        <button id="cancel-add-stop" class="btn-text">Cancel</button>
        <button id="manual-add-stop" class="btn-secondary" style="width: auto;">
          Add Manually
        </button>
      </div>
    </div>
  </div>

  <!-- Autosave Indicator -->
  <div id="autosave-indicator" class="autosave-indicator">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" style="display: inline-block; vertical-align: middle;">
      <path d="M10.97 4.97a.75.75 0 0 1 1.07 1.05l-3.99 4.99a.75.75 0 0 1-1.08.02L4.324 8.384a.75.75 0 1 1 1.06-1.06l2.094 2.093 3.473-4.425a.267.267 0 0 1 .02-.022z"/>
    </svg>
    Saved
  </div>

  <!-- Load dependencies -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Load our modules -->
  <script src="../lib/geocoder.js"></script>
  <script src="app.js"></script>
  <script src="i18n-editor.js"></script>
  <script src="export.js"></script>
  <script src="components/day-editor.js"></script>

  <!-- Main app initialization -->
  <script src="main.js"></script>
</body>
</html>
