<!-- Referral Widget Component -->
<!-- Add this to account.html or any dashboard page -->

<div class="referral-widget" id="referral-widget" style="display: none;">
  <style>
    .referral-widget {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }

    .referral-widget::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }

    .referral-widget-content {
      position: relative;
      z-index: 1;
    }

    .referral-widget h3 {
      margin: 0 0 12px 0;
      font-size: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .referral-widget p {
      margin: 0 0 16px 0;
      opacity: 0.95;
      font-size: 14px;
    }

    .referral-stats {
      display: flex;
      gap: 20px;
      margin: 16px 0;
      flex-wrap: wrap;
    }

    .referral-stat {
      flex: 1;
      min-width: 100px;
    }

    .referral-stat-value {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .referral-stat-label {
      font-size: 12px;
      opacity: 0.9;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .referral-actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .referral-btn {
      padding: 10px 20px;
      background: white;
      color: #667eea;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .referral-btn:hover {
      background: #f0f0f0;
      transform: translateY(-2px);
    }

    .referral-btn.secondary {
      background: rgba(255,255,255,0.2);
      color: white;
    }

    .referral-btn.secondary:hover {
      background: rgba(255,255,255,0.3);
    }

    .reward-badge {
      display: inline-block;
      background: rgba(76, 175, 80, 0.9);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 8px;
    }

    @media (max-width: 768px) {
      .referral-stats {
        flex-direction: column;
        gap: 12px;
      }

      .referral-actions {
        flex-direction: column;
      }

      .referral-btn {
        width: 100%;
        text-align: center;
      }
    }
  </style>

  <div class="referral-widget-content">
    <h3>
      <span>🎁</span>
      <span>Refer & Earn</span>
    </h3>

    <p>
      Give your friends <strong>$10 off</strong> and get <strong>1 month free</strong> for every 3 referrals!
    </p>

    <div class="referral-stats">
      <div class="referral-stat">
        <div class="referral-stat-value" id="widget-conversions">0</div>
        <div class="referral-stat-label">Referrals</div>
      </div>

      <div class="referral-stat">
        <div class="referral-stat-value" id="widget-progress">0/3</div>
        <div class="referral-stat-label">Next Reward</div>
      </div>
    </div>

    <div id="widget-rewards"></div>

    <div class="referral-actions">
      <a href="/referral-dashboard.html" class="referral-btn">
        Share Your Link
      </a>
      <button class="referral-btn secondary" onclick="quickShare()">
        Quick Share
      </button>
    </div>
  </div>
</div>

<script>
  // Load referral widget data
  async function loadReferralWidget() {
    try {
      const referralClient = new ReferralClient();
      referralClient.init(window.supabaseClient || supabase.createClient(
        'YOUR_SUPABASE_URL',
        'YOUR_SUPABASE_ANON_KEY'
      ));

      const stats = await referralClient.getStats();

      // Update widget
      document.getElementById('widget-conversions').textContent = stats.stats.conversions;
      document.getElementById('widget-progress').textContent =
        `${stats.stats.nextRewardProgress}/3`;

      // Show rewards if any
      if (stats.rewards && stats.rewards.length > 0) {
        const rewardsContainer = document.getElementById('widget-rewards');
        const activeRewards = stats.rewards.filter(r => !r.used);

        if (activeRewards.length > 0) {
          rewardsContainer.innerHTML = activeRewards.map(r =>
            `<div class="reward-badge">
              ${r.type === 'lifetime_premium' ? '👑 Lifetime Premium Active!' : '🎁 Free Month Available!'}
            </div>`
          ).join('');
        }
      }

      // Show widget
      document.getElementById('referral-widget').style.display = 'block';

    } catch (error) {
      console.error('Failed to load referral widget:', error);
    }
  }

  // Quick share function
  async function quickShare() {
    try {
      const referralClient = new ReferralClient();
      referralClient.init(window.supabaseClient);

      const codeData = await referralClient.generateReferralCode();

      // Try native share API first (mobile)
      if (navigator.share) {
        await navigator.share({
          title: 'Japan Trip Companion',
          text: 'Plan your perfect Japan trip with AI! Get $10 off when you sign up.',
          url: codeData.referralUrl
        });
      } else {
        // Fallback: Copy to clipboard
        const success = await referralClient.copyReferralLink(codeData.referralUrl);
        if (success) {
          alert('Link copied! Share it with your friends to give them $10 off.');
        }
      }
    } catch (error) {
      console.error('Failed to share:', error);
    }
  }

  // Auto-load widget if on account page
  if (document.getElementById('referral-widget')) {
    loadReferralWidget();
  }
</script>
