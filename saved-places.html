<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saved Places - Japan Trip Companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .header p {
      font-size: 16px;
      opacity: 0.9;
    }

    .stats-bar {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 20px 32px;
      color: white;
      min-width: 150px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 14px;
      opacity: 0.8;
    }

    .filter-tabs {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .filter-tab {
      padding: 10px 24px;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.2);
      color: white;
      border-radius: 24px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 14px;
      font-weight: 500;
    }

    .filter-tab:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .filter-tab.active {
      background: white;
      color: #667eea;
      border-color: white;
    }

    .places-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }

    .place-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .place-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.15);
    }

    .place-header {
      background: linear-gradient(135deg, #ef4444 0%, #f59e0b 100%);
      color: white;
      padding: 20px;
    }

    .place-source {
      display: inline-block;
      padding: 4px 12px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .place-name {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .place-category {
      font-size: 13px;
      opacity: 0.9;
    }

    .place-body {
      padding: 20px;
    }

    .place-detail {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 14px;
      color: #4b5563;
    }

    .place-detail svg {
      flex-shrink: 0;
      margin-top: 2px;
    }

    .place-footer {
      padding: 16px 20px;
      background: #f9fafb;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      flex: 1;
      min-width: 80px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #ef4444 0%, #f59e0b 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #374151;
    }

    .btn-secondary:hover {
      background: #d1d5db;
    }

    .btn-danger {
      background: #fee2e2;
      color: #dc2626;
    }

    .btn-danger:hover {
      background: #fecaca;
    }

    .empty-state {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 60px 40px;
      text-align: center;
      color: white;
    }

    .empty-state svg {
      margin-bottom: 20px;
      opacity: 0.6;
    }

    .empty-state h2 {
      font-size: 24px;
      margin-bottom: 12px;
    }

    .empty-state p {
      font-size: 16px;
      opacity: 0.8;
      margin-bottom: 24px;
    }

    .empty-state a {
      display: inline-block;
      padding: 12px 32px;
      background: white;
      color: #667eea;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: transform 0.2s ease;
    }

    .empty-state a:hover {
      transform: translateY(-2px);
    }

    .nav-link {
      display: inline-block;
      color: white;
      text-decoration: none;
      margin-bottom: 20px;
      opacity: 0.8;
      transition: opacity 0.2s ease;
    }

    .nav-link:hover {
      opacity: 1;
    }

    @media (max-width: 768px) {
      .places-grid {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 28px;
      }

      .stat-card {
        min-width: 120px;
        padding: 16px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="nav-link">← Back to Trip Planner</a>

    <div class="header">
      <h1>🌸 Saved Places</h1>
      <p>Places you've saved from Google Maps, TripAdvisor, and Airbnb</p>
    </div>

    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-value" id="totalCount">0</div>
        <div class="stat-label">Total Saved</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="pendingCount">0</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="addedCount">0</div>
        <div class="stat-label">Added to Trip</div>
      </div>
    </div>

    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all">All Places</button>
      <button class="filter-tab" data-filter="pending">Pending</button>
      <button class="filter-tab" data-filter="added">Added</button>
      <button class="filter-tab" data-filter="archived">Archived</button>
    </div>

    <div id="placesContainer" class="places-grid"></div>
  </div>

  <script>
    let allPlaces = [];
    let currentFilter = 'all';

    // Load places on page load
    document.addEventListener('DOMContentLoaded', () => {
      loadPlaces();

      // Setup filter tabs
      document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          currentFilter = tab.dataset.filter;
          document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          renderPlaces();
        });
      });
    });

    async function loadPlaces() {
      try {
        const response = await fetch('/api/extension/saved-pois');
        const data = await response.json();

        if (data.success) {
          allPlaces = data.pois;
          updateStats();
          renderPlaces();
        }
      } catch (error) {
        console.error('Error loading places:', error);
      }
    }

    function updateStats() {
      document.getElementById('totalCount').textContent = allPlaces.length;
      document.getElementById('pendingCount').textContent = allPlaces.filter(p => p.status === 'pending').length;
      document.getElementById('addedCount').textContent = allPlaces.filter(p => p.status === 'added').length;
    }

    function renderPlaces() {
      const container = document.getElementById('placesContainer');

      let filteredPlaces = allPlaces;
      if (currentFilter !== 'all') {
        filteredPlaces = allPlaces.filter(p => p.status === currentFilter);
      }

      if (filteredPlaces.length === 0) {
        container.innerHTML = `
          <div class="empty-state" style="grid-column: 1 / -1;">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <h2>No saved places yet</h2>
            <p>Install the Chrome extension and start saving places from Google Maps, TripAdvisor, and Airbnb!</p>
            <a href="https://github.com/caffeineGMT/japan-trip#chrome-extension" target="_blank">Get the Extension</a>
          </div>
        `;
        return;
      }

      container.innerHTML = filteredPlaces.map(place => `
        <div class="place-card" data-id="${place.id}">
          <div class="place-header">
            <div class="place-source">${formatSource(place.source)}</div>
            <div class="place-name">${escapeHtml(place.name)}</div>
            <div class="place-category">${escapeHtml(place.category || 'Attraction')}</div>
          </div>
          <div class="place-body">
            ${place.address ? `
              <div class="place-detail">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                  <circle cx="12" cy="10" r="3"/>
                </svg>
                <span>${escapeHtml(place.address)}</span>
              </div>
            ` : ''}
            ${place.rating ? `
              <div class="place-detail">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                </svg>
                <span>${escapeHtml(place.rating)}</span>
              </div>
            ` : ''}
            ${place.description ? `
              <div class="place-detail">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                  <polyline points="14 2 14 8 20 8"/>
                  <line x1="16" y1="13" x2="8" y2="13"/>
                  <line x1="16" y1="17" x2="8" y2="17"/>
                </svg>
                <span>${escapeHtml(place.description.substring(0, 100))}${place.description.length > 100 ? '...' : ''}</span>
              </div>
            ` : ''}
            <div class="place-detail">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
              </svg>
              <span>Saved ${formatDate(place.savedAt)}</span>
            </div>
          </div>
          <div class="place-footer">
            ${place.url ? `<button class="btn btn-primary" onclick="window.open('${place.url}', '_blank')">View Original</button>` : ''}
            ${place.status === 'pending' ? `
              <button class="btn btn-secondary" onclick="markAsAdded('${place.id}')">Mark as Added</button>
            ` : ''}
            <button class="btn btn-danger" onclick="deletePlace('${place.id}')">Delete</button>
          </div>
        </div>
      `).join('');
    }

    async function markAsAdded(id) {
      try {
        const response = await fetch(`/api/extension/poi/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: 'added' })
        });

        const data = await response.json();
        if (data.success) {
          await loadPlaces();
        }
      } catch (error) {
        console.error('Error updating place:', error);
        alert('Failed to update place. Please try again.');
      }
    }

    async function deletePlace(id) {
      if (!confirm('Are you sure you want to delete this place?')) {
        return;
      }

      try {
        const response = await fetch(`/api/extension/poi/${id}`, {
          method: 'DELETE'
        });

        const data = await response.json();
        if (data.success) {
          await loadPlaces();
        }
      } catch (error) {
        console.error('Error deleting place:', error);
        alert('Failed to delete place. Please try again.');
      }
    }

    function formatSource(source) {
      const sources = {
        'google_maps': 'Google Maps',
        'tripadvisor': 'TripAdvisor',
        'airbnb': 'Airbnb'
      };
      return sources[source] || source;
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      const now = new Date();
      const diffMs = now - date;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMs / 3600000);
      const diffDays = Math.floor(diffMs / 86400000);

      if (diffMins < 1) return 'just now';
      if (diffMins < 60) return `${diffMins}m ago`;
      if (diffHours < 24) return `${diffHours}h ago`;
      if (diffDays < 7) return `${diffDays}d ago`;
      return date.toLocaleDateString();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
